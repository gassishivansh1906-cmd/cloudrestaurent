# =====================================================================
# CloudRestaurant - PRODUCTION compose for AWS Free Tier
#   Runs ONLY frontend + backend on a small EC2 (t3.micro).
#   The database is Amazon RDS for SQL Server Express (external) -> no
#   heavy SQL Server container on the instance.
#
#   Usage on EC2:
#     docker compose -f docker-compose.prod.yml up -d --build
#   Requires a .env file (see .env.prod.example) with the RDS endpoint.
# =====================================================================

services:
  backend:
    build: ./backend
    container_name: cr-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      DB_SERVER: ${DB_SERVER}          # RDS endpoint, e.g. cr-db.xxxx.us-east-1.rds.amazonaws.com
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-CloudRestaurant}
      DB_USER: ${DB_USER}              # RDS master username
      DB_PASSWORD: ${DB_PASSWORD}      # RDS master password
      DB_ENCRYPT: "true"               # RDS connections are encrypted
      DB_TRUST_SERVER_CERT: "true"
      ADMIN_NAME: ${ADMIN_NAME:-Restaurant Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cloud.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
    expose:
      - "5000"
    networks: [cr-net]
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cr-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks: [cr-net]
    restart: unless-stopped

networks:
  cr-net:
    driver: bridge
