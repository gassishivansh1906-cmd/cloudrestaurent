services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    user: "0:0"
    environment:
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
  db-init:
    entrypoint:
      - /bin/bash
      - -c
      - |
        for i in $(seq 1 40); do /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$$DB_PASSWORD" -Q "SELECT 1" && break; echo "waiting for db..."; sleep 5; done && \
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$$DB_PASSWORD" -i /scripts/schema.sql && \
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "$$DB_PASSWORD" -d CloudRestaurant -i /scripts/seed.sql && \
        echo "Database initialized."
