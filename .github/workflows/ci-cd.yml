name: CI/CD - CloudRestaurant

# Runs on every push/PR to main:
#  1. CI  -> install + build frontend and backend (catches broken builds)
#  2. CD  -> SSH into the EC2 instance, pull latest code, rebuild containers
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # 1) Continuous Integration: build & sanity-check both apps
  # ---------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build backend
        working-directory: ./backend
        run: |
          npm install
          node --check src/server.js

      - name: Install & build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config

  # ---------------------------------------------------------------
  # 2) Continuous Deployment: only on push to main
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            REPO_URL="${{ secrets.REPO_URL }}"

            # Clone on first deploy, otherwise pull latest
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            # Write the production .env from GitHub secrets (EC2 + RDS)
            cat > .env <<EOF
            DB_SERVER=${{ secrets.DB_SERVER }}
            DB_PORT=1433
            DB_NAME=CloudRestaurant
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
            ADMIN_NAME=${{ secrets.ADMIN_NAME }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            EOF

            # Rebuild and restart the production stack (frontend + backend; DB is on RDS)
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
